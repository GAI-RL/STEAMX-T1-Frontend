<div class="message" [class.user-message]="message.role === 'user'" [class.assistant-message]="message.role === 'assistant'">
  <div class="message-wrapper">
    <div class="message-avatar">
      @if (message.role === 'user') {
        <div class="avatar user-avatar">
          {{ userInitial }}
        </div>
      } @else {
        <div class="avatar assistant-avatar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2L4 6V9C4 13 6 16 10 17C14 16 16 13 16 9V6L10 2Z" stroke="currentColor" stroke-width="2"/>
            <circle cx="10" cy="10" r="3" fill="currentColor"/>
          </svg>
        </div>
      }
    </div>
    
    <div class="message-content">
      <div class="message-header">
        <span class="message-sender">{{ message.role === 'user' ? userName : 'AI Assistant' }}</span>
        <span class="message-time">{{ formatTime(message.timestamp) }}</span>
      </div>
      <div class="message-text" [innerHTML]="formatContent(message.content)"></div>
    </div>
  </div>
</div>
