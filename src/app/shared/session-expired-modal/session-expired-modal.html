<div class="se-backdrop">
  <div class="se-modal" role="dialog" aria-modal="true" aria-labelledby="se-title">

    <div class="se-icon-wrap">
      <div class="se-icon-ring"></div>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="11" width="18" height="11" rx="2.5"
              stroke="currentColor" stroke-width="1.8"/>
        <path d="M7 11V7a5 5 0 0110 0v4"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="16.5" r="1.3" fill="currentColor"/>
      </svg>
    </div>

    <h2 class="se-title" id="se-title">Session Expired</h2>
    <p class="se-desc">
      Your login session has expired due to inactivity.<br>
      Please log in again to continue.
    </p>

    <button class="se-btn" (click)="onLoginNow()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Log in again
    </button>

    <p class="se-countdown">
      Redirecting automatically in
      <span class="se-countdown-num">{{ countdown }}s</span>
    </p>

    <div class="se-divider"></div>
    <p class="se-footer-note">Your unsaved draft will be restored after login.</p>

  </div>
</div>
